---
layout: default
---
<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <time class="post-meta" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
  </header>
  <div class="post-content">{{ content }}</div>
</article>
